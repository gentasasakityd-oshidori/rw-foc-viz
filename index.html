<title>めっけMON／FOC 全体構造（パスワード保護）</title>
<style>
  :root{color-scheme:light dark}
  body{margin:0;font-family:"BIZ UDPGothic","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:#F4F1E8;color:#23201A}
  @media(prefers-color-scheme:dark){body{background:#17140F;color:#ECE6D8}}
  #gate{min-height:100vh;display:grid;place-items:center;padding:24px;box-sizing:border-box}
  .card{width:min(92vw,380px);background:#FBF9F3;border:1px solid rgba(35,32,26,.14);border-radius:16px;padding:26px 24px;box-shadow:0 10px 40px rgba(0,0,0,.12)}

  .ey{font-family:Consolas,monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#C1741B;font-weight:700}
  h1{font-size:18px;margin:.3em 0 .1em}
  p.d{font-size:12.5px;color:#6E6656;margin:.2em 0 18px;line-height:1.6}
  @media(prefers-color-scheme:dark){p.d{color:#A79E8C}}
  label{font-size:12px;color:#6E6656;font-weight:700}
  input{width:100%;box-sizing:border-box;margin-top:6px;padding:11px 12px;font-size:15px;border:1px solid rgba(35,32,26,.2);border-radius:9px;background:#fff;color:#23201A}
  @media(prefers-color-scheme:dark){input{background:#0f0d0a;color:#ECE6D8;border-color:rgba(236,230,216,.2)}}
  button{margin-top:14px;width:100%;padding:11px;font-size:14px;font-weight:800;color:#fff;background:#C1741B;border:0;border-radius:9px;cursor:pointer}
  button:hover{background:#a86216}
  .err{color:#B0472E;font-size:12.5px;margin-top:10px;min-height:1.1em}
</style>
</head>

      <input id="pw" type="password" autocomplete="off" autofocus>

    </form>

    function dec(s){ return Uint8Array.from(atob(s), function(c){ return c.charCodeAt(0); }); }
    async function unlock(pw){
      var salt = dec(DATA.s), iv = dec(DATA.i), ct = dec(DATA.c);
      var km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
      var key = await crypto.subtle.deriveKey({ name:'PBKDF2', salt:salt, iterations:200000, hash:'SHA-256' }, km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
      var pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:iv }, key, ct);
      return new TextDecoder().decode(pt);
    }
    var f=document.getElementById('f'), pwin=document.getElementById('pw'), err=document.getElementById('err');
    f.addEventListener('submit', function(e){
      e.preventDefault(); err.textContent='開いています…';
      unlock(pwin.value).then(function(html){
        document.open(); document.write(html); document.close();
      }).catch(function(){ err.textContent='パスワードが違います。'; });
    });
